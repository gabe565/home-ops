# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tautulli
  namespace: tautulli
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      tautulli:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/tautulli
              tag: 2.17.0@sha256:b90b30e15d1b6d12fc726fac1ef9778ad92f405ac8f8ccb30a34d7f6673c113d
              pullPolicy: IfNotPresent
            env:
              TZ: America/Chicago
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              readOnlyRootFilesystem: true
        pod:
          labels:
            policy.gabe565.com/egress-namespace: "true"
            policy.gabe565.com/egress-plex: "true"
            policy.gabe565.com/egress-world: "true"
            policy.gabe565.com/ingress-authentik: "true"
            policy.gabe565.com/ingress-envoy-public: "true"
          securityContext:
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch

    service:
      tautulli:
        controller: tautulli
        ports:
          http:
            port: 8181

    persistence:
      config:
        suffix: config
        storageClass: longhorn-ssd
        accessMode: ReadWriteOnce
        size: 2Gi
        retain: true
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi

    route:
      tautulli:
        parentRefs:
          - namespace: kgateway-system
            name: public
        hostnames:
          - ${app_url}
        rules:
          - name: private
            backendRefs: &backendRefs
              - identifier: tautulli
          - name: public
            matches:
              - path:
                  type: Exact
                  value: /status
            backendRefs: *backendRefs

    rawResources:
      auth-ext:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: GatewayExtension
        spec:
          spec:
            type: OAuth2
            oauth2:
              backendRef:
                name: authentik-server
                namespace: authentik
                port: 80
              issuerURI: https://${oidc_host}/application/o/tautulli/
              credentials:
                clientID: ${oidc_client_id}
                clientSecretRef:
                  name: oidc
              scopes: [openid, offline_access]
      auth:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: TrafficPolicy
        spec:
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ .Release.Name }}"
                sectionName: private
            oauth2:
              extensionRef:
                name: "{{ .Release.Name }}-auth-ext"
