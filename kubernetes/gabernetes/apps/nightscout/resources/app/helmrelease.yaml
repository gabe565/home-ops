# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nightscout
  namespace: nightscout
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      nightscout:
        containers:
          app:
            image:
              repository: ghcr.io/gabe565/nightscout
              tag: 15.0.6-websocket@sha256:acdaaadd91122ce16c770d35cdf02708081bab46b9a78709592435da7b65ab02
              pullPolicy: IfNotPresent
            env:
              HOSTNAME: "::"
              PORT: "1337"

              TZ: America/Chicago
              TIME_FORMAT: "24"
              INSECURE_USE_HTTP: "true"
              API_SECRET: ${api_secret}
              AUTH_DEFAULT_ROLES: denied

              DB_PASSWORD:
                secretKeyRef:
                  name: mongodb
                  key: mongodb-passwords
              MONGODB_URI:
                value: mongodb://nightscout:$(DB_PASSWORD)@mongodb/nightscout
                dependsOn: DB_PASSWORD
              MONGODB_COLLECTION: entries

              ENABLE: careportal simplealarms
              DISABLE: ar2 simplealarms upbat dbsize

              DISPLAY_UNITS: mg/dl
              ALARM_TIMEAGO_URGENT: off
              ALARM_TIMEAGO_WARN: off
              ALARM_TYPES: " "
              DAY_START: "9.0"
              DAY_END: "23.0"
              DEVICESTATUS_ADVANCED: "true"
              EDIT_MODE: on
              SCALE_Y: linear
              SHOW_FORECAST: " "
              SHOW_RAWBG: noise
              THEME: colors
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: 1337
                    path: /api/v2/status.txt
                    httpHeaders:
                      - name: Api-Secret
                        value: '{{ sha1sum "${probe_token}" }}'
              readiness: *probe
              startup:
                enabled: true
                spec:
                  failureThreshold: 60
                  periodSeconds: 5
        pod:
          labels:
            policy.gabe565.com/egress-namespace: "true"
            policy.gabe565.com/egress-world: "true"
            policy.gabe565.com/ingress-home-assistant: "true"
            policy.gabe565.com/ingress-namespace: "true"
            policy.gabe565.com/ingress-envoy-public: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }

    service:
      nightscout:
        controller: nightscout
        ports:
          http:
            port: 1337

    route:
      oidc:
        parentRefs: &parentRefs
          - namespace: kgateway-system
            name: public
        hostnames:
          - ${app_url}
        rules:
          - name: oidc
            backendRefs: &backendRefs
              - identifier: nightscout
          - name: service-worker
            matches:
              - path:
                  type: Exact
                  value: /sw.js
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: gateway.kgateway.dev
                  kind: DirectResponse
                  name: nightscout-service-worker
      direct:
        parentRefs: *parentRefs
        hostnames:
          - ${api_url}
        rules:
          - backendRefs: *backendRefs

    rawResources:
      auth-ext:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: GatewayExtension
        spec:
          spec:
            type: OAuth2
            oauth2:
              backendRef:
                name: authentik-server
                namespace: authentik
                port: 80
              issuerURI: https://${oidc_host}/application/o/nightscout/
              credentials:
                clientID: ${oidc_client_id}
                clientSecretRef:
                  name: oidc
              scopes: [openid, offline_access, nightscout:token]
              jwt:
                idToken:
                  claimsToHeaders:
                    - name: nightscout_token
                      header: API-Secret
      auth:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: TrafficPolicy
        spec:
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ .Release.Name }}-oidc"
                sectionName: oidc
            oauth2:
              extensionRef:
                name: "{{ .Release.Name }}-auth-ext"
      service-worker:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: DirectResponse
        spec:
          spec:
            status: 200
            bodyFormat:
              contentType: application/javascript
              # language=javascript
              text: self.addEventListener('install', event => { event.waitUntil(self.skipWaiting()) });
