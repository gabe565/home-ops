# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: restic
  namespace: mattermost
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      labels:
        policy.gabe565.com/egress-healthchecks: "true"
        policy.gabe565.com/egress-namespace: "true"
        policy.gabe565.com/egress-world: "true"
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    cnpg.io/cluster: postgresql
                    cnpg.io/instanceRole: primary

    controllers:
      restic:
        type: cronjob
        cronjob:
          schedule: 5 2 * * *
          concurrencyPolicy: Replace
          ttlSecondsAfterFinished: 3600
        containers:
          restic: &container
            image:
              repository: ghcr.io/gabe565/restic
              tag: 0.18.1@sha256:b71c72d1ed372e802c40486699351a32ced0b0d0577819947e4d1de3a325310c
            envFrom:
              - secretRef:
                  name: restic-b2
              - secretRef:
                  name: restic-envs
            env:
              TZ: America/Chicago
              RESTIC_HOST:
                fieldRef:
                  fieldPath: metadata.namespace
              HC_API_URL: http://healthchecks.healthchecks:8000/ping
            command:
              - runitor
              - --
              - sh
              - -c
              # language=sh
              - |
                exec > >(ts '%H:%M:%S') 2>&1
                set -eu
                restic backup --tag=db --stdin-from-command -- dumpdb cnpg
                restic forget --prune --keep-daily=90 --keep-weekly=24 --keep-monthly=24 --keep-yearly=20
                restic cache --cleanup
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
      init:
        type: job
        annotations:
          helm.sh/hook: post-install
          helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
        containers:
          init:
            <<: *container
            command: [sh, -c, "restic init || true"]

    persistence:
      cache:
        storageClass: longhorn-ssd
        size: 1Gi
        accessMode: ReadWriteOnce
      postgresql-app:
        type: secret
        name: postgresql-app
