# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: your-spotify
  namespace: your-spotify
spec:
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      server:
        strategy: RollingUpdate
        containers:
          server:
            image:
              repository: ghcr.io/yooooomi/your_spotify_server
              tag: 1.20.0@sha256:624ea009f2ef9d877989bee9c7913ac66840449f566517871696c31a8ea13ddf
              pullPolicy: IfNotPresent
            env:
              TIMEZONE: America/Chicago
              API_ENDPOINT: https://${app_url}/api
              CLIENT_ENDPOINT: https://${app_url}
              SPOTIFY_PUBLIC: ${spotify_public}
              SPOTIFY_SECRET: ${spotify_secret}
              MONGO_NO_ADMIN_RIGHTS: "true"
              DB_PASSWORD:
                secretKeyRef:
                  name: mongodb
                  key: mongodb-passwords
              MONGO_ENDPOINT: mongodb://your-spotify:$(DB_PASSWORD)@mongodb/your-spotify
            probes: &probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities: {drop: [ALL]}
        pod: &pod
          labels:
            policy.gabe565.com/egress-namespace: "true"
            policy.gabe565.com/egress-world: "true"
            policy.gabe565.com/ingress-envoy-public: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
      client:
        strategy: RollingUpdate
        initContainers:
          cp-build:
            image: &clientImage
              repository: ghcr.io/yooooomi/your_spotify_client
              tag: 1.20.0@sha256:e4da90a0634c7862f9f4e893026ee8cd91380234fa2125b88b26c6fb9da3d47e
              pullPolicy: IfNotPresent
            command:
              - cp
              - -a
              - apps/client/build/.
              - /build
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              capabilities: {drop: [ALL]}
          template:
            image: *clientImage
            env:
              API_ENDPOINT: https://${app_url}/api
            command:
              - sh
              - -c
              - sh apps/client/scripts/run/variables.sh || true
            securityContext:
              <<: *securityContext
              readOnlyRootFilesystem: true
        containers:
          client:
            image:
              repository: ghcr.io/nginx/nginx-unprivileged
              tag: stable-alpine
              pullPolicy: IfNotPresent
            probes: *probes
            securityContext: *securityContext
        pod: *pod

    service:
      server:
        controller: server
        ports:
          http:
            port: 8080
      client:
        controller: client
        ports:
          http:
            port: 3000

    persistence:
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
      client-build:
        type: emptyDir
        advancedMounts:
          client:
            cp-build:
              - path: /build
            template:
              - path: /app/apps/client/build
            client:
              - path: /build
                readOnly: true
      nginx:
        type: configMap
        identifier: nginx
        advancedMounts:
          client:
            client:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf

    configMaps:
      nginx:
        enabled: true
        data:
          # language=nginx configuration
          default.conf: |
            server {
              listen 3000;
              server_name localhost;
              location / {
                root /build;
                try_files $uri /index.html;
              }
            }

    route:
      your-spotify:
        parentRefs:
          - namespace: kgateway-system
            name: public
        hostnames:
          - ${app_url}
        rules:
          - backendRefs:
              - identifier: client
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - identifier: server

    rawResources:
      auth-ext:
        manifest:
          apiVersion: gateway.kgateway.dev/v1alpha1
          kind: GatewayExtension
          spec:
            type: OAuth2
            oauth2:
              backendRef:
                name: authentik-server
                namespace: authentik
                port: 80
              issuerURI: https://${oidc_host}/application/o/your-spotify/
              credentials:
                clientID: ${oidc_client_id}
                clientSecretRef:
                  name: oidc
              scopes: [openid, offline_access]
      auth:
        manifest:
          apiVersion: gateway.kgateway.dev/v1alpha1
          kind: TrafficPolicy
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ .Release.Name }}"
            oauth2:
              extensionRef:
                name: "{{ .Release.Name }}-auth-ext"
