apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: envoy-gateway-upstream-tls
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: envoy-envoy-gateway-system-envoy-public-4a9bb8bb
  tls:
    wellKnownCACertificates: System
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fallback-to-envoy-gateway
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - namespace: kgateway-system
      name: public
      sectionName: https
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: envoy-envoy-gateway-system-envoy-public-4a9bb8bb
          port: 443
