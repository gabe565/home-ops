## envoy-gateway's own gateway.envoyproxy.io CRDs are installed here (not via the Helm
## chart) because the gateway-crds-helm release exceeds the 1Mi Helm-release Secret limit,
## and the gateway-helm crds/ dir also bundles experimental Gateway API CRDs that conflict
## with kgateway's standard-channel CRDs. The Gateway API CRDs stay kgateway-managed for now.
## prune is disabled so this can be removed cleanly once envoy-gateway owns all CRDs.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  interval: 1h
  url: https://github.com/envoyproxy/gateway
  ref:
    tag: v1.8.2
  ignore: |
    /*
    !/charts/gateway-helm/charts/crds/crds/generated
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-crds
  namespace: envoy-gateway-system
spec:
  interval: 1h
  path: ./charts/gateway-helm/charts/crds/crds/generated
  prune: false
  sourceRef:
    kind: GitRepository
    name: envoy-gateway
