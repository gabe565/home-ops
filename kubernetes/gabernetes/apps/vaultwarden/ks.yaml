apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: vaultwarden
spec:
  interval: 1h
  targetNamespace: vaultwarden
  path: ./kubernetes/gabernetes/apps/vaultwarden/app
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
  postBuild:
    substituteFrom:
      - kind: Secret
        name: app-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: restic
  namespace: vaultwarden
spec:
  interval: 1h
  targetNamespace: vaultwarden
  path: ./kubernetes/gabernetes/apps/vaultwarden/restic
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
