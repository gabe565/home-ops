# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      paperless-ngx:
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
              pullPolicy: IfNotPresent
            env:
              PAPERLESS_URL: https://${app_url}
              PAPERLESS_TIME_ZONE: America/Chicago
              PAPERLESS_SECRET_KEY: ${secret_key}
              PAPERLESS_ENABLE_HTTP_REMOTE_USER: "true"
              PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME: HTTP_X_USER_NAME
              PAPERLESS_LOGOUT_REDIRECT_URL: /oauth2/logout
              PAPERLESS_ALLOWED_HOSTS: "*"

              PAPERLESS_DBENGINE: postgresql
              PAPERLESS_DBHOST: postgresql-rw
              PAPERLESS_DBNAME: paperless-ngx
              PAPERLESS_DBUSER: paperless-ngx
              PAPERLESS_DBPASS:
                secretKeyRef:
                  name: postgresql-app
                  key: password

              REDIS_PASSWORD:
                secretKeyRef:
                  name: valkey
                  key: valkey-password
              PAPERLESS_REDIS:
                value: redis://:$(REDIS_PASSWORD)@valkey
                dependsOn: REDIS_PASSWORD
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              readOnlyRootFilesystem: true
        pod:
          labels:
            policy.gabe565.com/egress-namespace: "true"
            policy.gabe565.com/egress-world: "true"
            policy.gabe565.com/ingress-envoy-public: "true"

    service:
      paperless-ngx:
        controller: paperless-ngx
        ports:
          http:
            port: 8000

    persistence:
      data:
        suffix: data
        storageClass: longhorn-ssd
        accessMode: ReadWriteOnce
        size: 1Gi
        retain: true
        globalMounts:
          - path: /usr/src/paperless/data
      media:
        type: nfs
        server: 192.168.1.240
        path: /volume1/documents/paperless/media
        globalMounts:
          - path: /usr/src/paperless/media
      export:
        type: nfs
        server: 192.168.1.240
        path: /volume1/documents/paperless/export
        globalMounts:
          - path: /usr/src/paperless/export
      consume:
        type: nfs
        server: 192.168.1.240
        path: /volume1/documents/paperless/consume
        globalMounts:
          - path: /usr/src/paperless/consume
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /run
            subPath: run

    route:
      paperless-ngx:
        parentRefs:
          - namespace: kgateway-system
            name: public
        hostnames:
          - ${app_url}

    rawResources:
      auth-ext:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: GatewayExtension
        spec:
          spec:
            type: OAuth2
            oauth2:
              backendRef:
                name: authentik-server
                namespace: authentik
                port: 80
              issuerURI: https://${oidc_host}/application/o/paperless-ngx/
              credentials:
                clientID: ${oidc_client_id}
                clientSecretRef:
                  name: oidc
              scopes: [openid, profile, offline_access]
              logoutPath: /oauth2/logout
              jwt:
                idToken:
                  claimsToHeaders:
                    - name: preferred_username
                      header: X-User-Name
      auth:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: TrafficPolicy
        spec:
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ .Release.Name }}"
            oauth2:
              extensionRef:
                name: "{{ .Release.Name }}-auth-ext"
