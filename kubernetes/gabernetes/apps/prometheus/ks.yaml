apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: prometheus
spec:
  interval: 1h
  targetNamespace: prometheus
  path: ./kubernetes/gabernetes/apps/prometheus/app
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
  postBuild:
    substituteFrom:
      - kind: Secret
        name: app-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kromgo
  namespace: prometheus
spec:
  interval: 1h
  targetNamespace: prometheus
  path: ./kubernetes/gabernetes/apps/prometheus/kromgo
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: restic
  namespace: prometheus
spec:
  interval: 1h
  targetNamespace: prometheus
  path: ./kubernetes/gabernetes/apps/prometheus/restic
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
