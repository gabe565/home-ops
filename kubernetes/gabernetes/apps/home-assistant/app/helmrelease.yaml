# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.6.3@sha256:aed891b8f801072302815b4b0fab5adb714182967e9d2e2d4a2be558241c73ad
              pullPolicy: IfNotPresent
            env:
              TZ: America/Chicago
              DATABASE_URL:
                secretKeyRef:
                  name: postgresql-app
                  key: uri
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              readOnlyRootFilesystem: true
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: ipvlan
          labels:
            policy.gabe565.com/egress-mosquitto: "true"
            policy.gabe565.com/egress-namespace: "true"
            policy.gabe565.com/egress-nightscout: "true"
            policy.gabe565.com/egress-nodes: "true"
            policy.gabe565.com/egress-tronbyt: "true"
            policy.gabe565.com/egress-world-with-lan: "true"
            policy.gabe565.com/ingress-envoy-public: "true"
            policy.gabe565.com/ingress-world: "true"
          affinity: &affinity
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    topologyKey: kubernetes.io/hostname
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: home-assistant
      code:
        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.124.2@sha256:726c75e330d99c9e6545ff1208042ccc3d97465cf24cdb48b304d111a43cd441
              pullPolicy: IfNotPresent
            args:
              - --disable-telemetry
              - --disable-update-check
              - --auth=none
              - --user-data-dir=/config/.vscode
              - /config
            resources:
              requests:
                cpu: 0m
                memory: 50Mi
              limits:
                cpu: 500m
                memory: 500Mi
            securityContext:
              readOnlyRootFilesystem: true
              runAsUser: 0
        pod:
          labels:
            policy.gabe565.com/ingress-envoy-public: "true"
          affinity: *affinity

    persistence:
      config:
        suffix: config
        storageClass: longhorn-ssd
        accessMode: ReadWriteOnce
        size: 2Gi
        retain: true
      tmp:
        type: emptyDir
      cache:
        type: emptyDir
        globalMounts:
          - path: /root/.cache
            subPath: root/.cache
          - path: /root/.local
            subPath: root/.local
          - path: /run
            subPath: run
      code-config:
        type: emptyDir
        advancedMounts:
          code:
            app:
              - path: /root/.config

    service:
      home-assistant:
        controller: home-assistant
        primary: true
        ports:
          http:
            port: 8123
      code:
        controller: code
        ports:
          http:
            port: 8080

    route:
      app:
        parentRefs: &parentRefs
          - namespace: kgateway-system
            name: public
        hostnames:
          - ${app_url}
        rules:
          - backendRefs:
              - identifier: home-assistant
      code:
        parentRefs: *parentRefs
        hostnames:
          - ${code_url}
        rules:
          - backendRefs:
              - identifier: code

    rawResources:
      code-allowlist-ext:
        manifest:
          apiVersion: gateway.kgateway.dev/v1alpha1
          kind: GatewayExtension
          spec:
            type: OAuth2
            oauth2:
              backendRef:
                name: authentik-server
                namespace: authentik
                port: 80
              issuerURI: https://${oidc_host}/application/o/change-detection/
              credentials:
                clientID: ${oidc_client_id}
                clientSecretRef:
                  name: oidc
              scopes: [openid, offline_access]
      code-allowlist:
        manifest:
          apiVersion: gateway.kgateway.dev/v1alpha1
          kind: TrafficPolicy
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ .Release.Name }}-code"
            oauth2:
              extensionRef:
                name: "{{ .Release.Name }}-code-allowlist-ext"
