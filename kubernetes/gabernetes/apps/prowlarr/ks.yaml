apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: prowlarr
spec:
  interval: 1h
  targetNamespace: prowlarr
  path: ./kubernetes/gabernetes/apps/prowlarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
  postBuild:
    substituteFrom:
      - kind: Secret
        name: app-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: restic
  namespace: prowlarr
spec:
  interval: 1h
  targetNamespace: prowlarr
  path: ./kubernetes/gabernetes/apps/prowlarr/restic
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
