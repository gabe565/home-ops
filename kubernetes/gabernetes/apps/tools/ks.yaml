apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: tools
spec:
  interval: 1h
  targetNamespace: tools
  path: ./kubernetes/gabernetes/apps/tools/resources
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
  postBuild:
    substituteFrom:
      - kind: Secret
        name: substitutions
