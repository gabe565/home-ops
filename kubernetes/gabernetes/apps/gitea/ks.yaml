apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: gitea
spec:
  interval: 1h
  targetNamespace: gitea
  path: ./kubernetes/gabernetes/apps/gitea/app
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
  postBuild:
    substituteFrom:
      - kind: Secret
        name: app-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: valkey
  namespace: gitea
spec:
  interval: 1h
  targetNamespace: gitea
  path: ./kubernetes/gabernetes/apps/gitea/valkey
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
  postBuild:
    substituteFrom:
      - kind: Secret
        name: valkey-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: restic
  namespace: gitea
spec:
  interval: 1h
  targetNamespace: gitea
  path: ./kubernetes/gabernetes/apps/gitea/restic
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
