apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway
  namespace: kgateway-system
spec:
  chart:
    spec:
      chart: kgateway
      version: v2.3.0-main
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: kgateway-system
        name: kgateway
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controller:
      extraEnv:
        KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: "true"
