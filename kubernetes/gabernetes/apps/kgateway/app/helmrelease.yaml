apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway
  namespace: kgateway-system
spec:
  chart:
    spec:
      chart: kgateway
      version: v2.3.0-beta.7
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: kgateway-system
        name: kgateway
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controller:
      extraEnv:
        KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: "true"
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kgateway
            patch: |
              - op: add
                path: /spec/template/spec/hostAliases
                value:
                  - ip: 10.43.0.20
                    hostnames:
                      - ${oidc_host}
