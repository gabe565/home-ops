apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: kgateway-system
spec:
  interval: 1h
  targetNamespace: kgateway-system
  path: ./kubernetes/tennant/apps/kgateway/app
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config
  namespace: kgateway-system
spec:
  interval: 1h
  targetNamespace: kgateway-system
  path: ./kubernetes/tennant/apps/kgateway/config
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: home-ops
  dependsOn:
    - name: app
