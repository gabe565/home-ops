apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: default
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      sectionName: https
  clientIPDetection:
    xForwardedFor:
      trustedCIDRs:
        # https://www.cloudflare.com/ips/
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/32
  headers:
    earlyRequestHeaders:
      set:
        - name: X-Real-IP
          value: '%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%'
    lateResponseHeaders:
      remove:
        - Server
        - X-Powered-By
      set:
        - name: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains; preload
        - name: Referrer-Policy
          value: same-origin, strict-origin-when-cross-origin
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-Frame-Options
          value: SAMEORIGIN
