apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  chart:
    spec:
      chart: gateway-helm
      version: 1.8.2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: envoy-gateway-system
        name: envoyproxy
  interval: 1h
  driftDetection:
    mode: enabled
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
