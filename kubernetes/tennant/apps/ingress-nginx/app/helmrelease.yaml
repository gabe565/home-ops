apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 1h
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ingress-nginx
      version: v4.15.1
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: ingress-nginx
      interval: 1h
  valuesFrom:
    - kind: ConfigMap
      name: defaults
  values:
    controller:
      extraArgs:
        maxmind-mirror: ${geoip_mirror}

      maxmindLicenseKey: stub

      config:
        use-geoip2: "true"

      ingressClassResource:
        name: nginx
        default: true

      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
        loadBalancerIP: ${load_balancer_ip}
        ipFamilyPolicy: PreferDualStack

    defaultBackend:
      image:
        repository: ghcr.io/tarampampam/error-pages
        tag: 4.0.0@sha256:19989c478e900898cd556befc71bb71c5c0d2eae11678b26b8cac3df0c6805fb
